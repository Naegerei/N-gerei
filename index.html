<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naegerei</title>
    <style>
        /* 5-Sekunden-Intro-Animation */
        @keyframes fadeOut {
            0% { opacity: 1; visibility: visible; }
            90% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        /* Intro-Overlay-Stil */
        #intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 5s forwards;
        }

        #intro h2 {
            font-size: 2.5rem;
            text-transform: uppercase;
            border: none;
            text-align: center;
        }

        /* Grundlegendes Design mit Hintergrundbild */
        body {
            font-family: Arial, sans-serif;
            /* Ersetze 'hintergrund.png' mit dem genauen Dateinamen deines Hintergrundbildes */
            background-image: url('hintergrund.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Ein halbtransparenter Container, damit der Text über dem Hintergrundbild gut lesbar bleibt */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: rgba(0, 0, 0, 0.85); 
            padding: 30px;
            border-radius: 8px;
        }

        /* Header-Bereich: Überschrift links/mittig und Bild rechts */
        header {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #ffffff;
            padding-bottom: 20px;
            margin-bottom: 30px;
            gap: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            text-transform: uppercase;
            text-align: left; /* Überschrift richtet sich links aus */
            flex-grow: 1;
        }

        .header-img {
            max-width: 120px;
            height: auto;
            border: 2px solid #ffffff;
            background-color: #111;
        }

        /* Hauptinhalt: Angebote */
        main {
            margin-bottom: 40px;
        }

        h2 {
            border-bottom: 1px solid #ffffff;
            padding-bottom: 5px;
            margin-bottom: 20px;
        }

        /* Angebote-Grid */
        .offers {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .offer-card {
            border: 1px solid #ffffff;
            padding: 20px;
            background-color: rgba(17, 17, 17, 0.9);
        }

        .offer-card h3 {
            margin-top: 0;
        }

        /* Footer-Bereich: Kontaktinformationen */
        footer {
            border-top: 2px solid #ffffff;
            padding-top: 20px;
            font-size: 0.9rem;
        }

        .contact-info {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .contact-info a {
            color: #ffffff;
            text-decoration: underline;
        }

        /* Responsive Anpassungen für Smartphones */
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                text-align: center;
            }

            .header-img {
                max-width: 100px;
            }

            h1 {
                font-size: 2rem;
                text-align: center;
            }

            .contact-info {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <div id="intro">
        <h2>Hurvus bei der Nägerei</h2>
    </div>

    <div class="container">

        <header>
            <h1>Nägerei</h1>
            <img class="header-img" src="Baumwolle.png" alt="Beispiel PNG">
        </header>

        <main>
            <h2>Unsere Angebote</h2>
            <div class="offers">
                <div class="offer-card">
                    <h3>Verkauf</h3>
                    <p>Jung 1# = 20€<br>Alt 1# = 30€</p>
                </div>
                <div class="offer-card">
                    <h3>Service</h3>
                    <p>Manieren & Respekt beibringen</p>
                </div>
                <div class="offer-card">
                    <h3>Versand</h3>
                    <p>Mit Verpackung 1,00€ pro 10km</p>
                </div>
            </div>
        </main>

        <footer>
            <h3>Kontakt</h3>
            <div class="contact-info">
                <span><strong>E-Mail:</strong> <a href="mailto:naegerei@outlook.de">naegerei@outlook.de</a></span>
                <span><strong>Telefon:</strong> <a href="tel:08247 960990">08247 960990</a></span>
            </div>
        </footer>

    </div>

</body>
</html>
